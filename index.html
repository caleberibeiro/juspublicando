<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PrazoJus - Gestão inteligente de prazos judiciais para advogados. Integração com DataJud (CNJ), calculadora de prazos em dias úteis e calendário visual.">
    <title>PrazoJus — Gestão de Prazos Judiciais</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">

    <!-- Favicon (balança da justiça) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ========================================== -->
    <!-- SIDEBAR - Navegação Principal -->
    <!-- ========================================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="sidebar-logo-icon">⚖️</span>
            <span class="sidebar-logo-text">PrazoJus</span>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="#publicacoes" class="nav-item active" data-page="publicacoes">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
                        </svg>
                        <span>Publicações DJEN</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-text">
                <small class="text-muted">PrazoJus v1.0</small>
                <small class="text-muted">API DataJud · CNJ</small>
            </div>
        </div>
    </aside>

    <!-- ========================================== -->
    <!-- BOTÃO TOGGLE SIDEBAR (Mobile) -->
    <!-- ========================================== -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <!-- ========================================== -->
    <!-- CONTEÚDO PRINCIPAL -->
    <!-- ========================================== -->
    <main class="main-content" id="main-content">
        <!-- Conteúdo renderizado dinamicamente pelo app.js -->
        <div class="loading-initial">
            <div class="skeleton-card">
                <div class="skeleton skeleton-text" style="width: 40%; height: 28px;"></div>
                <div class="skeleton skeleton-text" style="width: 25%; height: 16px; margin-top: 8px;"></div>
            </div>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- TOAST CONTAINER -->
    <!-- ========================================== -->
    <div id="toast-container"></div>

    <!-- ========================================== -->
    <!-- SCRIPTS -->
    <!-- ========================================== -->
    <!-- Utilitários (devem ser carregados primeiro) -->
    <script src="js/utils.js"></script>
    <script src="js/deadlines.js"></script>

    <!-- Dados e API -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>

    <!-- Componentes -->
    <script src="js/calendar.js"></script>

    <!-- Aplicação principal (deve ser carregado por último) -->
    <script src="js/app.js"></script>
</body>
</html>
